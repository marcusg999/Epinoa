<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>DaVinci Eye - AR Tracing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <!-- Landing / Upload Screen -->
        <div id="landing-screen" class="screen active">
            <div class="landing-content">
                <div class="logo">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="2"/>
                        <path d="M30 70 Q50 20 70 70" fill="none" stroke="#fff" stroke-width="2.5"/>
                        <circle cx="50" cy="38" r="8" fill="none" stroke="#fff" stroke-width="2"/>
                        <circle cx="50" cy="38" r="3" fill="#fff"/>
                    </svg>
                </div>
                <h1>DaVinci Eye</h1>
                <p class="subtitle">AR Tracing Assistant</p>

                <div class="upload-area" id="upload-area">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Tap to upload reference image</p>
                    <p class="hint">or drag &amp; drop an image here</p>
                    <input type="file" id="image-input" accept="image/*" hidden>
                </div>

                <button id="sample-btn" class="btn btn-secondary">Use Sample Image</button>
            </div>
        </div>

        <!-- AR Camera Screen -->
        <div id="camera-screen" class="screen">
            <video id="camera-feed" autoplay playsinline muted></video>

            <div id="overlay-container">
                <img id="overlay-image" alt="Reference overlay" draggable="false">
            </div>

            <!-- Top toolbar -->
            <div id="top-toolbar">
                <button id="back-btn" class="toolbar-btn" aria-label="Back">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <span id="status-text">Adjust your overlay</span>
                <button id="switch-camera-btn" class="toolbar-btn" aria-label="Switch camera">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 16v-4a2 2 0 00-2-2h-3l-2-3H11l-2 3H6a2 2 0 00-2 2v4"/>
                        <path d="M16 16l-4 4-4-4"/>
                        <path d="M4 8V12a2 2 0 002 2h3"/>
                        <path d="M8 8l4-4 4 4"/>
                    </svg>
                </button>
            </div>

            <!-- Bottom controls -->
            <div id="bottom-controls">
                <div id="opacity-control">
                    <label for="opacity-slider">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a10 10 0 010 20" fill="currentColor" opacity="0.3"/>
                        </svg>
                    </label>
                    <input type="range" id="opacity-slider" min="0" max="100" value="50">
                    <span id="opacity-value">50%</span>
                </div>

                <div id="action-buttons">
                    <button id="reset-btn" class="action-btn" aria-label="Reset position">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0"/>
                            <path d="M3 12h4"/>
                            <path d="M3 12l2-2"/>
                            <path d="M3 12l2 2"/>
                        </svg>
                    </button>
                    <button id="lock-btn" class="action-btn" aria-label="Lock/unlock position">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                    </button>
                    <button id="new-image-btn" class="action-btn" aria-label="New image">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </button>
                    <input type="file" id="new-image-input" accept="image/*" hidden>
                </div>
            </div>
        </div>

        <!-- Error/Permission overlay -->
        <div id="error-overlay" class="overlay" hidden>
            <div class="overlay-content">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#ff4444" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p id="error-message">Camera access is required for AR tracing.</p>
                <button id="error-retry-btn" class="btn">Try Again</button>
                <button id="error-dismiss-btn" class="btn btn-secondary">Dismiss</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
